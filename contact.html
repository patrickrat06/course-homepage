<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Website 2</title>
    </head>

    <body>
        <a href="#main-content" class="skip-link">Skip to main content</a>
        <header> The second Website</header>
        <nav aria-label="Main navigation">
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
        </nav>
        <main id="main-content">
        <h1>Contact</h1>
        <section>
            <form method="post" action="#" aria-label="Contact form">
            <fieldset>
                <legend>Details</legend>
                <label for="name">Full name (required)</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email (required)</label>
                <input type="email" id="email" name="email" required>
                <label for="phone">Phone (optional, format: digits and spaces)</label>
                <input type="tel" id="phone" name="phone"
                    pattern="[0-9\s\-+]+" title="Only: digits, spaces, hyphens, or plus are accepted.">
            </fieldset>
            <fieldset>
                <legend>Message</legend>
                <label for="subject">Subject (required)</label>
                <input type="text" id="subject" name="subject" required
                    aria-describedby="subject-hint">
                <p id="subject-hint" class="form-hint">e.g. feedback, request, info, etc.</p>
                <label for="msg">Message (required)</label>
                <textarea id="msg" name="message" rows="5" required></textarea>
            </fieldset>
            <fieldset>
                <legend>What University programme are you following?</legend>
                <label for="prog-bachelor">Bachelor</label>
                <input type="radio" id="prog-bachelor" name="prog" value="bachelor">
                <label for="prog-master">Master</label>
                <input type="radio" id="prog-master" name="prog" value="master">
                <label for="prog-phd">PhD</label>
                <input type="radio" id="prog-phd" name="prog" value="phd">
                <label for="prog-no">None</label>
                <input type="radio" id="prog-no" name="prog" value="no">
            </fieldset>
            <button type="submit">Send</button>
            </form>
        </section>
        </main>
    </body>



</html>
